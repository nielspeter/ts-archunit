name: Update Context7 Docs

on:
  release:
    types: [published]
  workflow_dispatch: # Manual trigger

jobs:
  update-docs:
    runs-on: ubuntu-latest
    env:
      # rennf93/upsert-context7@1.1 internally uses actions/setup-python@v5 (Node 20)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Add/Refresh Context7 Documentation
        id: context7
        uses: rennf93/upsert-context7@1.1
        with:
          operation: ${{ github.event_name == 'release' && 'add' || 'refresh' }}

      - name: Show result
        run: |
          echo "Success: ${{ steps.context7.outputs.success }}"
          echo "Status: ${{ steps.context7.outputs.status-code }}"
          echo "Message: ${{ steps.context7.outputs.message }}"
